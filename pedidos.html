/* FILTRO */

window.filtrarCategoria =
function(categoria,botao){

categoriaAtual = categoria;

document.querySelectorAll('.cat')
.forEach(btn=>{

btn.classList.remove('active');

});

botao.classList.add('active');

renderProdutos();

}

/* RENDER */

function renderProdutos(){

lista.innerHTML='';

let listaFiltrada = [...produtos];

if(categoriaAtual !== 'todos'){

listaFiltrada =
listaFiltrada.filter(
p=>p.categoria === categoriaAtual
);

}

listaFiltrada.forEach((produto)=>{

lista.innerHTML += `

<div class="card">

<div class="info">

<h3>${produto.nome}</h3>

<div class="preco">

R$ ${produto.preco.toFixed(2).replace('.',',')}

</div>

</div>

<div class="controles">

<button
class="btn remove"
onclick="remover('${produto.nome}')">

-

</button>

<div class="qtd">

${getQtd(produto.nome)}

</div>

<button
class="btn add"
onclick="adicionar('${produto.nome}')">

+

</button>

</div>

</div>

`;

});

}

/* ADICIONAR */

window.adicionar = function(nome){

const produto =
produtos.find(
p=>p.nome === nome
);

if(!produto) return;

/* JARRA DE SUCO */

if(produto.nome === 'Jarra de suco'){

produtoSucoAtual = produto;

abrirModalSuco();

return;

}

/* COMPLETOS */

if(produto.categoria === 'espetosCompletos'){

produtoTemporario = produto;

abrirAdicionais();

return;

}

/* NORMAL */

adicionarProduto(produto);

}

/* ADD PRODUTO */

function adicionarProduto(produto){

const item =
carrinho.find(
i=>
i.nome === produto.nome
&&
JSON.stringify(i.adicionais || [])
===
JSON.stringify(produto.adicionais || [])
);

if(item){

item.qtd++;

}else{

carrinho.push({

...produto,
qtd:1

});

}

atualizarCarrinho();

renderProdutos();

}

/* MODAL ADICIONAIS */

window.abrirAdicionais = function(){

document
.getElementById('modalAdicionais')
.classList.add('active');

}

window.fecharAdicionais = function(){

document
.getElementById('modalAdicionais')
.classList.remove('active');

}

/* CONFIRMAR */

window.confirmarAdicionais = function(){

const checks =
document.querySelectorAll(
'#modalAdicionais input:checked'
);

let adicionais = [];

checks.forEach(check=>{

adicionais.push(check.value);

});

const precoExtras =
adicionais.length * 6;

const produtoFinal = {

...produtoTemporario,

preco:
produtoTemporario.preco + precoExtras,

adicionais

};

adicionarProduto(produtoFinal);

document
.querySelectorAll(
'#modalAdicionais input'
)
.forEach(input=>{

input.checked = false;

});

fecharAdicionais();

}

/* REMOVER */

window.remover = function(nome){

const item =
carrinho.find(
i=>i.nome === nome
);

if(item){

item.qtd--;

if(item.qtd <= 0){

carrinho =
carrinho.filter(
i=>i !== item
);

}

}

atualizarCarrinho();

renderProdutos();

}

/* QTD */

function getQtd(nome){

const qtd =
carrinho
.filter(i=>i.nome === nome)
.reduce((acc,item)=>acc + item.qtd,0);

return qtd;

}

/* CARRINHO */

function atualizarCarrinho(){

itens.innerHTML='';

let total = 0;
let qtdTotal = 0;

carrinho.forEach(item=>{

const subtotal =
item.preco * item.qtd;

total += subtotal;

qtdTotal += item.qtd;

itens.innerHTML += `

<div class="item">

<span>

${item.nome}

${
item.adicionais
&&
item.adicionais.length > 0

?

'<br><small style="color:#d4a937;">+ '
+
item.adicionais.join(', ')
+
'</small>'

:

''

}

x${item.qtd}

</span>

<span>

R$ ${subtotal.toFixed(2).replace('.',',')}

</span>

</div>

`;

});

totalDiv.innerHTML =
`R$ ${total.toFixed(2).replace('.',',')}`;

cartText.innerHTML =
`${qtdTotal} itens • R$ ${total.toFixed(2).replace('.',',')}`;

}

window.fecharCarrinho = function(){

document

}

/* LIMPAR */

window.limparCarrinho = function(){

carrinho=[];

atualizarCarrinho();

/* ENVIAR */

window.enviarPedido =
async function(){

const mesa =
document.getElementById('mesa').value;

if(!mesa){

mostrarStatus(
'Digite a mesa',
'erro'
);

return;

}

if(carrinho.length===0){

mostrarStatus(
'Adicione itens',
'erro'
);

return;

}

const total =
carrinho.reduce(
(acc,item)=>acc + item.preco * item.qtd,
0
);

try{

await addDoc(collection(db,'pedidos'),{

mesa,

itens:carrinho,

total,

status:'novo',

impressaoCozinha:'pendente',

impressaoChurrasqueira:'pendente',

timestamp:Date.now(),

horario:new Date()
.toLocaleTimeString('pt-BR')

});

mostrarStatus(
'Pedido enviado com sucesso!',
'ok'
);

limparCarrinho();

fecharCarrinho();

document.getElementById('mesa').value='';

}catch(e){

mostrarStatus(
'Erro ao enviar pedido',
'erro'
);

console.log(e);

}

}

/* STATUS */

function mostrarStatus(texto,tipo){

status.style.display='block';

status.innerHTML = texto;

status.className =
'status ' + tipo;

setTimeout(()=>{

status.style.display='none';

},3000);

}
/* VARIÁVEL SUCO */

let produtoSucoAtual = null;

/* MODAL SUCO */

window.abrirModalSuco = function(){

const saboresDiv =
document.getElementById('saboresSuco');

saboresDiv.innerHTML='';

produtoSucoAtual.sabores.forEach(sabor=>{

saboresDiv.innerHTML += `

<button
class="saborBtn"
onclick="selecionarSabor('${sabor}')">

${sabor}

</button>

`;

});

document
.getElementById('modalSuco')
.classList.add('active');

}

window.fecharModalSuco = function(){

document
.getElementById('modalSuco')
.classList.remove('active');

}

window.selecionarSabor = function(sabor){

const nomeFinal =
'Jarra de suco - ' + sabor;

const item =
carrinho.find(
i=>i.nome === nomeFinal
);

if(item){

item.qtd++;

}else{

carrinho.push({

...produtoSucoAtual,

nome:nomeFinal,

qtd:1

});

}

atualizarCarrinho();

renderProdutos();

fecharModalSuco();

}
renderProdutos();

</script>
<!-- MODAL SUCO -->

<div class="modal" id="modalSuco">

<div class="modalTop">

<h2>🧃 Escolha o sabor</h2>

<button
class="close"
onclick="fecharModalSuco()">

✕

</button>

</div>

<div id="saboresSuco"></div>

</div>
</body>
</html>
