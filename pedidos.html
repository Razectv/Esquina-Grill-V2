<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos - Esquina Grill</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050505;
  color:white;
  padding-bottom:90px;
}

/* HEADER */

.header{
  position:sticky;
  top:0;
  z-index:999;
  background:#0b0b0b;
  border-bottom:2px solid #c89b2c;
  padding:12px;
}

.top-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.logo{
  color:#d4a937;
  font-size:22px;
  font-weight:bold;
}

.mesa-box{
  display:flex;
  align-items:center;
  gap:10px;
}

.mesa-box span{
  color:#d4a937;
  font-weight:bold;
}

.mesa-box input{
  width:75px;
  height:42px;
  border:none;
  border-radius:12px;
  text-align:center;
  font-size:18px;
}

.search{
  width:100%;
  height:45px;
  border:none;
  border-radius:14px;
  background:#111;
  border:1px solid #2a2a2a;
  color:white;
  padding:0 15px;
  font-size:15px;
}

/* CATEGORIAS */

.categorias{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:14px 12px;
}

.categorias::-webkit-scrollbar{
  display:none;
}

.categoria{
  min-width:100px;
  background:#111;
  border:1px solid #2a2a2a;
  padding:10px;
  border-radius:12px;
  text-align:center;
  font-size:14px;
  cursor:pointer;
}

.categoria.active{
  background:#d4a937;
  color:black;
  font-weight:bold;
}

/* PRODUTOS */

.produtos{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:0 12px 20px 12px;
}

.card{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:18px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:110px;
  object-fit:cover;
}

.info{
  padding:10px;
}

.info h3{
  font-size:15px;
  margin-bottom:5px;
}

.preco{
  color:#d4a937;
  font-weight:bold;
  margin-bottom:10px;
}

.actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.qtd{
  font-weight:bold;
}

.btn{
  width:38px;
  height:38px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:22px;
  font-weight:bold;
}

.add{
  background:#d4a937;
  color:black;
}

.remove{
  background:#791515;
  color:white;
}

/* BOTÃO CARRINHO */

.cart-button{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  background:#1f9d47;
  border:none;
  border-radius:18px;
  padding:18px;
  color:white;
  font-size:18px;
  font-weight:bold;
  z-index:999;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* MODAL */

.cart-modal{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  background:#0d0d0d;
  border-top-left-radius:24px;
  border-top-right-radius:24px;
  padding:20px;
  transition:0.3s;
  z-index:1000;
  max-height:80vh;
  overflow-y:auto;
}

.cart-modal.active{
  bottom:0;
}

.modal-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.close{
  background:#222;
  width:38px;
  height:38px;
  border-radius:50%;
  border:none;
  color:white;
}

.item{
  display:flex;
  justify-content:space-between;
  margin-bottom:14px;
  padding-bottom:12px;
  border-bottom:1px solid #222;
}

.total{
  display:flex;
  justify-content:space-between;
  font-size:24px;
  font-weight:bold;
  margin:20px 0;
}

.send{
  width:100%;
  border:none;
  background:#1f9d47;
  color:white;
  padding:18px;
  border-radius:16px;
  font-size:18px;
  font-weight:bold;
}

.clear{
  width:100%;
  border:none;
  background:#222;
  color:white;
  padding:16px;
  border-radius:16px;
  margin-top:12px;
}

/* RESPONSIVO */

@media(max-width:768px){

  .produtos{
    grid-template-columns:1fr 1fr;
  }

}

</style>
</head>

<body>

<div class="header">

  <div class="top-row">

    <div class="logo">
      🍽️ Esquina Grill
    </div>

    <div class="mesa-box">

      <span>Mesa</span>

      <input type="number"
      id="mesa"
      placeholder="05">

    </div>

  </div>

  <input
  class="search"
  type="text"
  placeholder="Buscar produtos...">

</div>

<!-- CATEGORIAS -->

<div class="categorias">

  <div class="categoria active">
    Todos
  </div>

  <div class="categoria">
    Churrasco
  </div>

  <div class="categoria">
    Bebidas
  </div>

  <div class="categoria">
    Porções
  </div>

  <div class="categoria">
    Sobremesas
  </div>

</div>

<!-- PRODUTOS -->

<div class="produtos" id="produtos"></div>

<!-- BOTÃO -->

<button
class="cart-button"
onclick="abrirCarrinho()">

🛒 <span id="cartText">
0 itens • R$ 0,00
</span>

</button>

<!-- MODAL -->

<div class="cart-modal" id="cartModal">

  <div class="modal-top">

    <h2>🛒 Pedido</h2>

    <button
    class="close"
    onclick="fecharCarrinho()">

    ✕

    </button>

  </div>

  <div id="itens"></div>

  <div class="total">

    <span>Total</span>

    <span id="total">
      R$ 0,00
    </span>

  </div>

  <button
  class="send"
  onclick="enviarPedido()">

    📤 Enviar para Balcão

  </button>

  <button
  class="clear"
  onclick="limparCarrinho()">

    🗑️ Limpar Pedido

  </button>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyBWy83v0Q9M2GhZk_FRi4JWfvs_EGJ7WH4",

  authDomain: "esquina-grill-v2.firebaseapp.com",

  databaseURL: "https://esquina-grill-v2-default-rtdb.firebaseio.com",

  projectId: "esquina-grill-v2",

  storageBucket: "esquina-grill-v2.firebasestorage.app",

  messagingSenderId: "767057341995",

  appId: "1:767057341995:web:e4df055c70b25ad714446e",

  measurementId: "G-KB4HDRWFDS"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* PRODUTOS */

const produtos = [

{
 nome:'Picanha Grelhada',
 preco:59.90,
 imagem:'https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=1200&auto=format&fit=crop'
},

{
 nome:'Galinha Caipira',
 preco:40,
 imagem:'https://images.unsplash.com/photo-1600891964092-4316c288032e?q=80&w=1200&auto=format&fit=crop'
},

{
 nome:'Feijoada',
 preco:38,
 imagem:'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=1200&auto=format&fit=crop'
},

{
 nome:'Strogonoff',
 preco:30,
 imagem:'https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1200&auto=format&fit=crop'
},

{
 nome:'Batata Frita',
 preco:18,
 imagem:'https://images.unsplash.com/photo-1576107232684-1279f390859f?q=80&w=1200&auto=format&fit=crop'
}

];

/* VARIÁVEIS */

let carrinho = [];

const produtosDiv =
document.getElementById('produtos');

const itensDiv =
document.getElementById('itens');

const totalDiv =
document.getElementById('total');

const cartText =
document.getElementById('cartText');

/* RENDER PRODUTOS */

function renderProdutos(){

 produtosDiv.innerHTML='';

 produtos.forEach((produto,index)=>{

  produtosDiv.innerHTML += `

  <div class="card">

    <img src="${produto.imagem}">

    <div class="info">

      <h3>${produto.nome}</h3>

      <div class="preco">
      R$ ${produto.preco.toFixed(2).replace('.',',')}
      </div>

      <div class="actions">

        <button
        class="btn remove"
        onclick="remover(${index})">

        -

        </button>

        <div class="qtd">
          ${getQtd(produto.nome)}
        </div>

        <button
        class="btn add"
        onclick="adicionar(${index})">

        +

        </button>

      </div>

    </div>

  </div>

  `;

 });

}

/* ADICIONAR */

window.adicionar = function(index){

 const produto = produtos[index];

 const item =
 carrinho.find(i=>i.nome===produto.nome);

 if(item){

   item.qtd++;

 }else{

   carrinho.push({

     ...produto,

     qtd:1

   });

 }

 atualizarCarrinho();

 renderProdutos();

}

/* REMOVER */

window.remover = function(index){

 const produto = produtos[index];

 const item =
 carrinho.find(i=>i.nome===produto.nome);

 if(item){

  item.qtd--;

  if(item.qtd<=0){

    carrinho =
    carrinho.filter(
      i=>i.nome!==produto.nome
    );

  }

 }

 atualizarCarrinho();

 renderProdutos();

}

/* CARRINHO */

function atualizarCarrinho(){

 itensDiv.innerHTML='';

 let total = 0;

 let qtdTotal = 0;

 carrinho.forEach(item=>{

  const subtotal =
  item.preco * item.qtd;

  total += subtotal;

  qtdTotal += item.qtd;

  itensDiv.innerHTML += `

  <div class="item">

    <span>
      ${item.nome} x${item.qtd}
    </span>

    <span>
      R$ ${subtotal.toFixed(2).replace('.',',')}
    </span>

  </div>

  `;

 });

 totalDiv.innerHTML =

 `R$ ${total.toFixed(2).replace('.',',')}`;

 cartText.innerHTML =

 `${qtdTotal} itens • R$ ${total.toFixed(2).replace('.',',')}`;

}

/* PEGAR QUANTIDADE */

function getQtd(nome){

 const item =
 carrinho.find(i=>i.nome===nome);

 return item ? item.qtd : 0;

}

/* MODAL */

window.abrirCarrinho = function(){

 document
 .getElementById('cartModal')
 .classList.add('active');

}

window.fecharCarrinho = function(){

 document
 .getElementById('cartModal')
 .classList.remove('active');

}

/* LIMPAR */

window.limparCarrinho = function(){

 carrinho=[];

 atualizarCarrinho();

 renderProdutos();

}

/* ENVIAR */

window.enviarPedido = async function(){

 const mesa =
 document.getElementById('mesa').value;

 if(!mesa){

   alert('Digite a mesa');
   return;

 }

 if(carrinho.length===0){

   alert('Adicione itens');
   return;

 }

 const pedido = {

   mesa: mesa,

   itens: carrinho,

   total: carrinho.reduce(
     (acc,item)=>acc + item.preco * item.qtd,
     0
   ),

   status:'novo',

   timestamp: Date.now(),

   data:
   new Date().toLocaleDateString('pt-BR'),

   hora:
   new Date().toLocaleTimeString('pt-BR'),

   atendente:'João'

 };

 try{

   await addDoc(
     collection(db,'pedidos'),
     pedido
   );

   alert('✅ Pedido enviado com sucesso!');

   limparCarrinho();

   fecharCarrinho();

   document.getElementById('mesa').value='';

 }catch(erro){

   console.log(erro);

   alert('❌ Erro ao enviar pedido');

 }

}

/* INICIAR */

renderProdutos();

</script>

</body>
</html>
